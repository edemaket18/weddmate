  <defs><marker id="arr3" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

  </g>

  <line x1="98" y1="152" x2="160" y2="123" stroke-width="0.5" class="arr" marker-end="url(#arr3)"/>
  <line x1="98" y1="162" x2="160" y2="177" stroke-width="0.5" class="arr" marker-end="url(#arr3)"/>
  <line x1="98" y1="172" x2="160" y2="231" stroke-width="0.5" class="arr" marker-end="url(#arr3)"/>

  <path d="M360 69 L420 69" fill="none" stroke-width="0.5" stroke-dasharray="5 3" class="arr" marker-end="url(#arr3)"/>

  <path d="M360 177 L420 177" fill="none" stroke-width="0.5" stroke-dasharray="5 3" class="arr" marker-end="url(#arr3)"/>

<script>
window.showTab = (i) => {
  document.querySelectorAll('.uc-tab').forEach((t,j) => t.classList.toggle('active', i===j));
