 <!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WeddMate — Invitation</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #1B3A5C; --accent: #C9A84C; --white: #FFFFFF;
      --gray: #F4F6F8; --border: #D0D9E4; --text: #1E2D3D;
      --muted: #6B7C93; --success: #38A169; --danger: #E53E3E;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--gray); min-height: 100vh; }
    .header { background: var(--primary); padding: 32px 20px 28px; text-align: center; }
    .header-emoji { font-size: 44px; margin-bottom: 12px; }
    .header-title { font-size: 22px; font-weight: 700; color: var(--white); margin-bottom: 6px; }
    .header-date { font-size: 14px; color: var(--accent); margin-bottom: 4px; }
    .header-lieu { font-size: 13px; color: rgba(255,255,255,0.65); }
    .card { background: var(--white); border-radius: 20px; margin: 16px; padding: 24px; box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
    .card-title { font-size: 18px; font-weight: 700; color: var(--text); text-align: center; margin-bottom: 20px; }
    .statut-row { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
    .statut-btn { padding: 14px; border-radius: 12px; border: 2px solid var(--border); background: var(--white); font-size: 15px; font-weight: 600; cursor: pointer; text-align: center; color: var(--text); }
    .statut-btn.selected-confirme { background: var(--success); border-color: var(--success); color: var(--white); }
    .statut-btn.selected-decline { background: var(--danger); border-color: var(--danger); color: var(--white); }
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    .field input, .field textarea { width: 100%; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 15px; color: var(--text); background: var(--gray); font-family: inherit; }
    .field textarea { resize: none; min-height: 80px; }
    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .toggle-row { display: flex; gap: 10px; margin-bottom: 14px; }
    .toggle-chip { flex: 1; padding: 12px; border-radius: 10px; border: 1.5px solid var(--border); background: var(--white); font-size: 13px; font-weight: 600; cursor: pointer; text-align: center; color: var(--text); }
    .toggle-chip.active { background: var(--primary); border-color: var(--primary); color: var(--white); }
    .submit-btn { width: 100%; padding: 16px; border: none; border-radius: 14px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 8px; }
    .submit-btn.confirme { background: var(--primary); color: var(--white); }
    .submit-btn.decline { background: var(--danger); color: var(--white); }
    .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.4); border-top-color: var(--white); border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .err-box { background: #fff5f5; border: 1px solid #fed7d7; border-radius: 10px; padding: 12px; color: var(--danger); font-size: 14px; margin-top: 10px; display: none; text-align: center; }
    .err-box.show { display: block; }
    .confirm-page { display: none; }
    .confirm-page.show { display: block; }
    .confirm-hero { background: var(--primary); padding: 48px 24px; text-align: center; }
    .confirm-emoji { font-size: 60px; margin-bottom: 16px; }
    .confirm-title { font-size: 26px; font-weight: 800; color: var(--white); margin-bottom: 8px; }
    .confirm-name { font-size: 16px; color: var(--accent); }
    .confirm-card { background: var(--white); border-radius: 20px; margin: 16px; padding: 24px; box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
    .confirm-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 0.5px solid var(--border); }
    .confirm-row:last-child { border-bottom: none; }
    .confirm-lbl { font-size: 13px; color: var(--muted); }
    .confirm-val { font-size: 13px; font-weight: 600; color: var(--text); text-align: right; max-width: 60%; }
    .reminder-box { background: rgba(27,58,92,0.06); border-radius: 12px; padding: 14px; margin: 0 16px 16px; text-align: center; font-size: 13px; color: var(--primary); line-height: 1.6; }
    .thank-you { text-align: center; padding: 16px 24px 32px; font-size: 15px; color: var(--muted); line-height: 1.7; }
    .closed { text-align: center; padding: 60px 32px; }
    .closed-emoji { font-size: 52px; margin-bottom: 16px; }
    .closed-title { font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
    .closed-sub { font-size: 14px; color: var(--muted); }
    .footer { text-align: center; padding: 20px; color: var(--muted); font-size: 12px; }
    .footer span { color: var(--accent); font-weight: 600; }
    .info-bar { background: var(--white); margin: 0 16px 16px; border-radius: 16px; padding: 16px 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .info-item { display: flex; justify-content: space-between; padding: 7px 0; border-bottom: 0.5px solid var(--border); font-size: 13px; }
    .info-item:last-child { border-bottom: none; }
    .info-lbl { color: var(--muted); }
    .info-val { color: var(--text); font-weight: 500; }
  </style>
</head>
<body>

<!-- Les données sont injectées directement par Express — plus de fetch -->
<script>
  var WEDDING = __WEDDING_DATA__;
</script>

<div id="closedView" style="display:none">
  <div class="header">
    <div class="header-emoji">💍</div>
    <div class="header-title" id="closedTitle">WeddMate</div>
  </div>
  <div class="closed">
    <div class="closed-emoji">🔒</div>
    <div class="closed-title">Formulaire fermé</div>
    <div class="closed-sub" id="closedMsg"></div>
  </div>
  <div class="footer">Propulsé par <span>WeddMate</span> 💍</div>
</div>

<div id="formView" style="display:none">
  <div class="header">
    <div class="header-emoji">💍</div>
    <div class="header-title" id="formTitle"></div>
    <div class="header-date" id="formDate"></div>
    <div class="header-lieu" id="formLieu"></div>
  </div>

  <div class="card">
    <div class="card-title">Confirmez votre présence</div>
    <div class="statut-row">
      <button class="statut-btn" id="btnConfirme" onclick="setStatut('CONFIRME')">✅ Je serai présent(e)</button>
      <button class="statut-btn" id="btnDecline" onclick="setStatut('DECLINE')">❌ Je ne pourrai pas venir</button>
    </div>
    <div class="row-2">
      <div class="field"><label>Prénom *</label><input type="text" id="prenom" placeholder="Kokou"/></div>
      <div class="field"><label>Nom *</label><input type="text" id="nom" placeholder="Mensah"/></div>
    </div>
    <div class="field">
      <label>WhatsApp <span style="color:var(--muted);font-weight:400">(rappel J-7)</span></label>
      <input type="tel" id="whatsapp" placeholder="+228 90 00 00 00"/>
    </div>
    <div id="confirmFields" style="display:none">
      <div class="field"><label>Nombre d'accompagnants</label><input type="number" id="nombreAccompa" placeholder="0" min="0" value="0"/></div>
      <div class="field"><label>Régime alimentaire</label><input type="text" id="regimeAliment" placeholder="Ex: Végétarien, Halal..."/></div>
      <div class="field">
        <label>Besoins logistiques</label>
        <div class="toggle-row">
          <button class="toggle-chip" id="btnTransport" onclick="toggleChip('transport')">🚗 Transport</button>
          <button class="toggle-chip" id="btnHebergement" onclick="toggleChip('hebergement')">🏨 Hébergement</button>
        </div>
      </div>
    </div>
    <div class="field"><label>Message aux mariés 💌</label><textarea id="message" placeholder="Vos vœux..." maxlength="500"></textarea></div>
    <div class="err-box" id="errBox"></div>
    <button class="submit-btn confirme" id="submitBtn" onclick="submitRsvp()" disabled>Sélectionnez votre réponse</button>
  </div>

  <div class="info-bar" id="infoBar" style="display:none">
    <div style="font-size:13px;font-weight:700;color:var(--text);margin-bottom:10px">ℹ️ Informations pratiques</div>
    <div id="infoItems"></div>
  </div>
  <div class="footer">Propulsé par <span>WeddMate</span> 💍</div>
</div>

<div id="confirmView" class="confirm-page">
  <div class="confirm-hero">
    <div class="confirm-emoji" id="cEmoji">🎉</div>
    <div class="confirm-title" id="cTitle"></div>
    <div class="confirm-name" id="cName"></div>
  </div>
  <div class="confirm-card">
    <div style="font-size:17px;font-weight:700;color:var(--text);margin-bottom:16px;text-align:center">💍 Détails du mariage</div>
    <div id="cDetails"></div>
  </div>
  <div class="reminder-box" id="reminderBox" style="display:none">📱 Un rappel WhatsApp vous sera envoyé 7 jours avant le mariage.</div>
  <div class="thank-you" id="thankYou"></div>
  <div class="footer">Propulsé par <span>WeddMate</span> 💍</div>
</div>

<script>
  var statut = null;
  var transport = false;
  var hebergement = false;

  // Initialisation — données déjà disponibles, pas de fetch
  (function init() {
    if (!WEDDING || WEDDING.error || !WEDDING.rsvpOuvert) {
      var msg = (WEDDING && WEDDING.error) || 'Formulaire non disponible.';
      var title = (WEDDING && WEDDING.nomCeremonie) || 'WeddMate';
      document.getElementById('closedTitle').textContent = title;
      document.getElementById('closedMsg').textContent = msg;
      document.getElementById('closedView').style.display = 'block';
      return;
    }

    var d = WEDDING;
    document.title = 'WeddMate — ' + d.nomCeremonie;
    document.getElementById('formTitle').textContent = d.nomCeremonie;

    if (d.dateJourJ) {
      var date = new Date(d.dateJourJ).toLocaleDateString('fr-FR', {
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
      });
      document.getElementById('formDate').textContent = '📅 ' + date;
    }
    if (d.lieuCeremonie) {
      document.getElementById('formLieu').textContent = '📍 ' + d.lieuCeremonie;
    }

    var items = [];
    if (d.heureCeremonie) items.push({ lbl: '⛪ Cérémonie', val: d.heureCeremonie });
    if (d.heureReception) items.push({ lbl: '🥂 Réception', val: d.heureReception });
    if (d.lieuCeremonie)  items.push({ lbl: '📍 Cérémonie', val: d.lieuCeremonie });
    if (d.lieuReception)  items.push({ lbl: '🏛️ Réception', val: d.lieuReception });
    if (items.length > 0) {
      document.getElementById('infoBar').style.display = 'block';
      document.getElementById('infoItems').innerHTML = items.map(function(i) {
        return '<div class="info-item"><span class="info-lbl">' + i.lbl + '</span><span class="info-val">' + i.val + '</span></div>';
      }).join('');
    }

    document.getElementById('formView').style.display = 'block';
  })();

  function setStatut(s) {
    statut = s;
    document.getElementById('btnConfirme').className = 'statut-btn' + (s === 'CONFIRME' ? ' selected-confirme' : '');
    document.getElementById('btnDecline').className = 'statut-btn' + (s === 'DECLINE' ? ' selected-decline' : '');
    document.getElementById('confirmFields').style.display = s === 'CONFIRME' ? 'block' : 'none';
    var btn = document.getElementById('submitBtn');
    btn.disabled = false;
    btn.className = 'submit-btn ' + (s === 'CONFIRME' ? 'confirme' : 'decline');
    btn.textContent = s === 'CONFIRME' ? '🎉 Confirmer ma présence' : '😢 Envoyer ma réponse';
  }

  function toggleChip(field) {
    if (field === 'transport') {
      transport = !transport;
      document.getElementById('btnTransport').className = 'toggle-chip' + (transport ? ' active' : '');
    } else {
      hebergement = !hebergement;
      document.getElementById('btnHebergement').className = 'toggle-chip' + (hebergement ? ' active' : '');
    }
  }

  async function submitRsvp() {
    var prenom = document.getElementById('prenom').value.trim();
    var nom = document.getElementById('nom').value.trim();
    var whatsapp = document.getElementById('whatsapp').value.trim();
    var nombreAccompa = parseInt(document.getElementById('nombreAccompa').value || '0') || 0;
    var regimeAliment = document.getElementById('regimeAliment').value.trim();
    var message = document.getElementById('message').value.trim();
    var errEl = document.getElementById('errBox');
    errEl.classList.remove('show');

    if (!statut) { errEl.textContent = 'Veuillez sélectionner votre réponse.'; errEl.classList.add('show'); return; }
    if (!prenom) { errEl.textContent = 'Le prénom est requis.'; errEl.classList.add('show'); return; }
    if (!nom)    { errEl.textContent = 'Le nom est requis.'; errEl.classList.add('show'); return; }

    var btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Envoi...';

    try {
      // Le POST utilise une URL relative — pas de problème CORS
      var slug = WEDDING.slug;
      var res = await fetch('/rsvp/' + slug, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prenom: prenom, nom: nom, statut: statut,
          whatsapp: whatsapp || undefined, nombreAccompa: nombreAccompa,
          regimeAliment: regimeAliment || undefined, transport: transport,
          hebergement: hebergement, messageAuxMaries: message || undefined }),
      });
      var json = await res.json();
      if (!res.ok) throw new Error(json.error || 'Erreur.');
      showConfirm(prenom, nom, statut, whatsapp, json.data.weddingDetails);
    } catch(e) {
      btn.disabled = false;
      btn.textContent = statut === 'CONFIRME' ? '🎉 Confirmer ma présence' : '😢 Envoyer ma réponse';
      errEl.textContent = '❌ ' + (e.message || 'Erreur. Réessayez.');
      errEl.classList.add('show');
    }
  }

  function showConfirm(prenom, nom, statut, whatsapp, details) {
    document.getElementById('formView').style.display = 'none';
    var cv = document.getElementById('confirmView');
    cv.classList.add('show');
    var ok = statut === 'CONFIRME';
    document.getElementById('cEmoji').textContent = ok ? '🎉' : '😢';
    document.getElementById('cTitle').textContent = ok ? 'Présence confirmée !' : 'Réponse enregistrée';
    document.getElementById('cName').textContent = prenom + ' ' + nom;
    if (details) {
      var date = new Date(details.dateJourJ).toLocaleDateString('fr-FR', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
      var rows = [{ lbl:'💍 Mariage', val: details.nomCeremonie }, { lbl:'📅 Date', val: date }];
      if (details.heureCeremonie) rows.push({ lbl:'⛪ Cérémonie', val: details.heureCeremonie });
      if (details.heureReception) rows.push({ lbl:'🥂 Réception', val: details.heureReception });
      if (details.lieuCeremonie)  rows.push({ lbl:'📍 Lieu', val: details.lieuCeremonie });
      if (details.lieuReception)  rows.push({ lbl:'🏛️ Réception', val: details.lieuReception });
      document.getElementById('cDetails').innerHTML = rows.map(function(r) {
        return '<div class="confirm-row"><span class="confirm-lbl">'+r.lbl+'</span><span class="confirm-val">'+r.val+'</span></div>';
      }).join('');
    }
    if (ok && whatsapp) document.getElementById('reminderBox').style.display = 'block';
    document.getElementById('thankYou').textContent = ok
      ? 'Merci ! Nous avons hâte de vous voir le jour J. 💍'
      : 'Merci pour votre réponse. Vous serez regretté(e) !';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
</script>
</body>
</html>
