services:
  - type: web
    name: weddmate-api
    runtime: node
    rootDir: backend

    buildCommand: npm install && npx prisma generate && npm run build

    startCommand: npm start

    envVars:
      - key: NODE_ENV
        value: production

      - key: DATABASE_URL
        fromDatabase:
          name: weddmate-db
          property: connectionString

      - key: JWT_SECRET
        sync: false

      - key: JWT_EXPIRES_IN
        value: 7d


databases:
  - name: weddmate-db
    databaseName: weddmate
    user: weddmate