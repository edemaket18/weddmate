services:
  - type: web
    name: weddmate-api
    runtime: node
    rootDir: backend

    buildCommand: npm install && npx prisma generate && npm run build

    startCommand: npm start

    envVars:
      - key: NODE_ENV
        value: production

      - key: DATABASE_URL
        fromDatabase:
          name: weddmate-db
          property: connectionString

      - key: JWT_SECRET
        sync: false

      - key: JWT_EXPIRES_IN
        value: 7d

      - key: APP_BASE_URL
        sync: false

      - key: SUPABASE_URL
        sync: false

      - key: SUPABASE_SERVICE_KEY
        sync: false

      - key: BUCKET_NAME
        value: weddmate-photos

      - key: BUCKET_QR
        value: weddmate-qrcodes

      - key: WHATSAPP_TOKEN
        sync: false

      - key: WHATSAPP_PHONE_ID
        sync: false


databases:
  - name: weddmate-db
    databaseName: weddmate
    user: weddmate